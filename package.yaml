spec-version:        0.36.0

name:                winapi-test
version:             0.1.0.0
license:             BSD-3-Clause

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/winapi-test#readme>

dependencies:
- base >= 4.7 && < 5

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

executables:
  winapi-test:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    # WINDOWS サブシステム: 起動時にコンソールを割り当てない（GUI 向け PE）
    - -optl=-Wl,--subsystem,windows
    # サイズ: セクション分割、GC、strip。デバッグ情報は出さない（バイナリにソースパスが残りにくい）
    - -g0
    - -O2
    - -split-sections
    - -optl=-Wl,--gc-sections
    - -optl=-s
    dependencies:
    - base

tests:
  winapi-test-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - winapi-test
